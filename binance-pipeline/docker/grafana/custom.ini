################################################################################
# SignalDesk — Grafana custom configuration
# Applied by mounting this file to /etc/grafana/grafana.ini inside the container
################################################################################

[server]
instance_name = SignalDesk

[database]
# uses the default SQLite inside grafana_data volume

[security]
admin_user     = admin
admin_password = admin
# Show a more prominent application name in the browser tab
cookie_name    = signaldesk_session

[users]
default_theme  = dark
viewers_can_edit = false

[analytics]
reporting_enabled      = false
check_for_updates      = false
check_for_plugin_updates = false
feedback_links_enabled = false

[news]
news_feed_enabled = false

[alerting]
enabled = false

[unified_alerting]
enabled = true

[log]
mode  = console
level = warn

[paths]
# keep defaults — volume mounts provide data & dashboards
